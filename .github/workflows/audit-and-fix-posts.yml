name: Auditoría y corrección automática de posts

on:
  schedule:
    # Cada 5 días a las 8:00 AM UTC
    - cron: '0 8 */5 * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde GitHub Actions

jobs:
  audit-and-fix:
    name: Auditar y expandir posts cortos con IA
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configurar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      # 3. Instalar dependencias del script
      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      # 4. Ejecutar auditoría + corrección con IA
      - name: Ejecutar fix-short-posts
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fix-short-posts.js

      # 5. Si hubo cambios, hacer commit y push automáticamente
      - name: Commit y push si hay posts corregidos
        run: |
          git config user.name "vitagloss-bot[bot]"
          git config user.email "bot@vitaglossrd.com"
          git add frontend/src/data/posts.js
          if git diff --cached --quiet; then
            echo "✅ Sin cambios — todos los posts ya tienen el largo correcto."
          else
            FECHA=$(date +'%Y-%m-%d')
            git commit -m "chore(blog): expandir posts cortos con IA — $FECHA"
            git push
            echo "🚀 Posts corregidos y subidos."
          fi
